; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
version = "3.3.2"
to_old_version = "3.2.0"

##
[env:esp32dev]
platform = espressif32@^6.0.0
board = esp32dev
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB
board_build.flash_mode = dio
board_upload.flash_freq = "40m"
extra_scripts = scripts/extra_script.py

[platformio]
default_envs = 
	esp32dev
	esp32-s3-devkitc-1

[env]
build_flags = 
	-Os
	-ffunction-sections
	-fdata-sections
	-mtext-section-literals
	-DVERSION=\"${common.version}\"
	-DTOOLDVERSION=\"${common.to_old_version}\"
	-DASYNCWEBSERVER_REGEX
	-DCONFIG_ARDUHAL_LOG_COLORS=1
	-DCONFIG_OPTIMIZATION_LEVEL_DEBUG=1
	-DBOOT_APP_PARTITION_OTA_0=1
	-DCONFIG_ASYNC_TCP_RUNNING_CORE=1
	-DCONFIG_ASYNC_TCP_MAX_ACK_TIME=10000
	-DCONFIG_ASYNC_TCP_QUEUE_SIZE=128
	-DCONFIG_ASYNC_TCP_STACK_SIZE=8192
	-DCONFIG_ASYNC_TCP_PRIORITY=10
	-DCONFIG_ASYNC_TCP_USE_WDT=1
	-DCONFIG_LWIP_TCP_MSL=30000
	-DCONFIG_LWIP_TCP_RCV_BUF_DEFAULT=8192
	-DCONFIG_LWIP_MAX_ACTIVE_TCP=16
lib_deps = 
	tzapu/WiFiManager
	https://github.com/me-no-dev/ESPAsyncWebServer.git#master
	https://github.com/esphome/AsyncTCP.git
	bogde/HX711 @ ^0.7.5
	adafruit/Adafruit SSD1306 @ ^2.5.13
	adafruit/Adafruit GFX Library @ ^1.11.11
	adafruit/Adafruit PN532 @ ^1.3.3
	bblanchon/ArduinoJson @ ^7.3.0
	knolleary/PubSubClient @ ^2.8
	digitaldragon/SSLClient @ ^1.3.2
monitor_speed = 115200

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
framework = arduino
extra_scripts = scripts/extra_script.py
upload_protocol = esptool
board_build.flash_mode = dio
platform = espressif32
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_upload.flash_size = 8MB

